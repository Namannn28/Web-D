<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            width: 100vw;
            height: 100vh;
            background-color: aquamarine;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            height: 350px;
            width: 250px;
            background-color: rgb(248, 243, 242);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding: 20px;
        }
        .card h2{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="https://tse2.mm.bing.net/th/id/OIP.VAntbTQR7QWsOn7_2Bdr5QHaHa?w=900&h=900&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Card Image">
            <div>
                <h2>Learn Coding</h2>
            </div>
        </div>

    </div>
</body>
</html>
