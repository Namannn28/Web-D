<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Sample Form</title>
</head>
<body>

    <h2>Create Your Account</h2>
    <p>Please fill out the details below to register.</p>

    <form action="/register" method="POST">

        <fieldset>
            <legend>Personal Details</legend>

            <label for="fullName">Full Name:</label><br>
            <input type="text" id="fullName" name="user_full_name" placeholder="e.g. Jane Doe" required><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="user_email" placeholder="jane@example.com" required><br><br>

            <label for="pwd">Create Password:</label><br>
            <input type="password" id="pwd" name="user_password" required><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="user_dob">
        </fieldset>
        <br>

        <fieldset>
            <legend>Your Preferences</legend>

            <label for="role">What best describes you?</label><br>
            <select id="role" name="user_role">
                <option value="student">Student</option>
                <option value="developer">Developer</option>
                <option value="designer">Designer</option>
                <option value="other">Other</option>
            </select><br><br>

            <p>Preferred Contact Method:</p>
            <input type="radio" id="contactEmail" name="contact_method" value="email" checked>
            <label for="contactEmail">Email</label><br>

            <input type="radio" id="contactPhone" name="contact_method" value="phone">
            <label for="contactPhone">Phone</label><br><br>

            <p>Interests (Select all that apply):</p>
            <input type="checkbox" id="intWeb" name="interests" value="web_dev">
            <label for="intWeb">Web Development</label><br>

            <input type="checkbox" id="intApp" name="interests" value="app_dev">
            <label for="intApp">App Development</label><br>

            <input type="checkbox" id="intUI" name="interests" value="ui_ux">
            <label for="intUI">UI/UX Design</label>
        </fieldset>
        <br>

        <fieldset>
            <legend>Additional Information</legend>

            <label for="bio">Short Bio (Tell us about yourself):</label><br>
            <textarea id="bio" name="user_bio" rows="4" cols="50" placeholder="I am a passionate coder..."></textarea><br><br>

            <label for="avatar">Upload Profile Picture:</label><br>
            <input type="file" id="avatar" name="user_avatar" accept="image/*">
        </fieldset>
        <br>

        <input type="submit" value="Create Account">
        <input type="reset" value="Clear Form">
        <input type="image" src="submit-icon.png" alt="Submit Form" width="100" height="40">

    </form>

</body>
</html>
